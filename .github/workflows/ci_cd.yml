name: ci-and-cd-to-cloudrun-with-postgres
# This workflow runs a set of yarn commands to compile, test and build a backstage application 

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      
      - name: Install Dependencies
        run: yarn install  

      - name: Compile TypeScript
        run: yarn tsc


      - name: Run Unit Tests
        run: yarn test:all

    
      - name: Build the application
        run: yarn build:all
# =========================
# CD — DEPLOY TO GCP VM
# =========================

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Create SSH key
      - name: Create SSH key
        run: |
          echo "${{ secrets.GCP_SSH_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      # -----------------------------------
      # CLEAN OLD DEPLOYMENT + FIX PERMISSIONS
      # -----------------------------------
      - name: Prepare VM
        run: |
          ssh -o StrictHostKeyChecking=no -i private_key.pem \
          ${{ secrets.GCP_SSH_USERNAME }}@${{ secrets.GCP_INSTANCE_IP }} << 'EOF'

            echo "Stopping existing Backstage..."
            pkill -f backstage || true

            echo "Fixing permissions..."
            sudo chown -R $USER:$USER ~ || true

            echo "Removing old deployment..."
            rm -rf ~/backstage

          EOF

      # -----------------------------------
      # COPY NEW CODE (without .git)
      # -----------------------------------
      - name: Copy Backstage project to VM
        run: |
          rsync -avz --delete \
          --exclude=".git" \
          --exclude="node_modules" \
          -e "ssh -o StrictHostKeyChecking=no -i private_key.pem" \
          ./ \
          ${{ secrets.GCP_SSH_USERNAME }}@${{ secrets.GCP_INSTANCE_IP }}:/home/${{ secrets.GCP_SSH_USERNAME }}/backstage

      # -----------------------------------
      # INSTALL NODE 24 + YARN
      # -----------------------------------
      - name: Prepare VM environment
        run: |
          ssh -o StrictHostKeyChecking=no -i private_key.pem \
          ${{ secrets.GCP_SSH_USERNAME }}@${{ secrets.GCP_INSTANCE_IP }} << 'EOF'

            echo "Updating packages..."
            sudo apt-get update

            if ! command -v node &> /dev/null; then
              echo "Installing Node.js 24..."
              curl -fsSL https://deb.nodesource.com/setup_24.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi

            if ! command -v yarn &> /dev/null; then
              sudo npm install -g yarn
            fi

            node -v
            yarn -v

          EOF

      # -----------------------------------
      # INSTALL + BUILD
      # -----------------------------------
      - name: Install dependencies and build
        run: |
          ssh -o StrictHostKeyChecking=no -i private_key.pem \
          ${{ secrets.GCP_SSH_USERNAME }}@${{ secrets.GCP_INSTANCE_IP }} << 'EOF'

            cd ~/backstage

            echo "Installing dependencies..."
            yarn install --frozen-lockfile

            echo "Building Backstage..."
            yarn build:all

          EOF

      # -----------------------------------
      # START APPLICATION
      # -----------------------------------
      - name: Start Backstage
        run: |
          ssh -o StrictHostKeyChecking=no -i private_key.pem \
          ${{ secrets.GCP_SSH_USERNAME }}@${{ secrets.GCP_INSTANCE_IP }} << 'EOF'

            cd ~/backstage

            echo "Starting Backstage backend..."
            nohup yarn start-backend > backstage.log 2>&1 &

            echo "Deployment completed successfully"

          EOF